name: Squash master into online on release

on:
  release:
    types: [published]

jobs:
  squash-merge-master-to-online:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_ACTION_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Squash merge master into online
        run: |
          git checkout online
          git fetch origin
          git reset --hard origin/master
          git push --force origin online
